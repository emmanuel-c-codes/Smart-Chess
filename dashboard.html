<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div class="main-layout">
        <nav class="side-nav">
            <button>Play</button>
            <button>Puzzles</button>
            <button>Learn</button>
        </nav>

        <div class="board-area">
            <div id="opponent-info">Opponent</div>
            <div id="chessboard" style="width: 500px;"></div>
            <div id="player-info">You</div>
        </div>

        <aside class="game-panel">
            <div class="tabs">Moves | Info | Openings</div>
            <div id="move-list"></div>
            <div class="controls">
                <button>◀</button> <button>▶</button>
            </div>
        </aside>
    </div>

<script>
    // 1. Initialize the game logic
    var game = new Chess();

    // 2. This function handles the movement and capture logic
    function onDrop(source, target) {
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        // If the move is illegal, snap it back
        if (move === null) return 'snapback';

        // If a capture occurred, you can trigger your "score" logic here
        if (move.flags.includes('c')) {
            console.log("Piece captured:", move.captured);
        }
    }

    // 3. Initialize the board using your existing 'chessboard' ID
    var config = {
        draggable: true, // This enables the dragging
        position: 'start',
        onDrop: onDrop,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };
    
    var board = Chessboard('chessboard', config);
</script>
</body>
</html>
