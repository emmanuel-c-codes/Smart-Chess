<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div class="main-layout">
        <nav class="side-nav">
            <button>Play</button>
            <button>Puzzles</button>
            <button>Learn</button>
        </nav>

        <div class="board-area">
            <div id="opponent-info">Opponent</div>
            <div id="chessboard" style="width: 500px;"></div>
            <div id="player-info">You</div>
        </div>

        <aside class="game-panel">
            <div class="tabs">Moves | Info | Openings</div>
            <div id="move-list"></div>
        </aside>
    </div>

    <script>
        // Initialize the game engine and the board
        var game = new Chess();
        
        function onDrop(source, target) {
            // Check if the move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            // If illegal, snap piece back
            if (move === null) return 'snapback';
            
            // Log move for your sidebar list
            document.getElementById('move-list').innerHTML += `<div>${game.history().length}. ${move.san}</div>`;
        }

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        // This command creates the interactive board for you
        var board = Chessboard('chessboard', config);
        
    </script>
</body>
</html>
