<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="profile-container">
        <h1>Profile</h1>
        
        <div class="avatar" id="avatar" onclick="document.getElementById('file-input').click()">
            <span id="avatar-text">Upload</span>
        </div>
        <input type="file" id="file-input" style="display:none;" accept="image/*">
        
        <div class="username" id="username-display" onclick="enableEdit()" style="cursor:pointer;">Loading...</div>
        <input type="text" id="username-input" style="display:none; text-align:center; width:200px;" onblur="saveUsername()">
        
        <div class="id-container">
            <span>ID: <span id="user-id">Loading...</span></span>
            <button onclick="copyId()" style="background:none; border:none; cursor:pointer;">📋</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFSIqcnP5U0CMjQZtIS3jK5VTVcHGLPRw",
            authDomain: "client-cc4df.firebaseapp.com",
            projectId: "client-cc4df",
            storageBucket: "client-cc4df.firebasestorage.app",
            messagingSenderId: "600063857476",
            appId: "1:600063857476:web:9abfe8219251f56e67fd11"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 1. Initial Load
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('username-display').innerText = data.username || "Set Name";
                    document.getElementById('user-id').innerText = user.uid.substring(0,6);
                    
                    // Display image from Base64 string if it exists
                    if (data.photoURL) {
                        const avatar = document.getElementById('avatar');
                        avatar.style.backgroundImage = `url(${data.photoURL})`;
                        document.getElementById('avatar-text').style.display = 'none';
                    }
                }
            }
        });

        // 2. IMAGE UPLOAD (Base64 approach - No Storage required)
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const user = auth.currentUser;
            if (!file || !user) return;

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64String = reader.result;
                try {
                    showToast('Saving...');
                    // Save Base64 string directly to Firestore
                    await updateDoc(doc(db, "users", user.uid), { photoURL: base64String });
                    
                    // Update UI
                    const avatar = document.getElementById('avatar');
                    avatar.style.backgroundImage = `url(${base64String})`;
                    document.getElementById('avatar-text').style.display = 'none';
                    showToast('SAVED');
                } catch (error) {
                    console.error("Error:", error);
                    showToast('Error saving');
                }
            };
            reader.readAsDataURL(file);
        };

        // 3. Helper Functions
        window.enableEdit = () => {
            document.getElementById('username-display').style.display = 'none';
            const input = document.getElementById('username-input');
            input.style.display = 'block';
            input.value = document.getElementById('username-display').innerText;
            input.focus();
        };

        window.saveUsername = async () => {
            const input = document.getElementById('username-input');
            const display = document.getElementById('username-display');
            const user = auth.currentUser;
            if (user) {
                await updateDoc(doc(db, "users", user.uid), { username: input.value });
                display.innerText = input.value;
                display.style.display = 'block';
                input.style.display = 'none';
                showToast('NAME UPDATED');
            }
        };

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>



    <style>
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #0b1a2f;
    color: white;
    font-family: sans-serif;
}
.profile-container {
    text-align: center;
    width: 90%;
    max-width: 400px;
    background: #0b1a2f;
}
.avatar {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background-color: #1a2a3f;
    border: 3px solid #00d4ff;
    margin: 0 auto 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
.username { 
    font-size: 24px; 
    margin-bottom: 20px; 
    padding: 10px;
    background: #1a2a3f;
    border-radius: 8px;
    cursor: pointer; 
}
.id-container { 
    background: #1a2a3f; 
    padding: 10px; 
    border-radius: 8px; 
    display: inline-block; 
}
.toast { 
    position: fixed; bottom: 30px; background: #00d4ff; color: black; 
    padding: 10px 20px; border-radius: 20px; display: none; 
}
    </style>
