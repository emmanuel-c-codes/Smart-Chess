<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tab-content { display: none; }
        #search-box { display: block; }
        /* Challenge Modal Style */
        #challenge-modal { display:none; position:fixed; top:20%; left:10%; right:10%; padding:20px; background:#262421; color:white; border:2px solid #575551; z-index:999; text-align:center; border-radius:8px; }
        #loading-screen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#262421; color:white; justify-content:center; align-items:center; z-index:1000; font-size: 20px; }
    </style>
</head>
<body>

    <div id="challenge-modal">
        <p id="challenge-text">Player wants to play!</p>
        <button onclick="window.acceptChallenge()" style="background:#81b64c; color:white; padding:10px 20px; border:none; cursor:pointer;">ACCEPT</button>
        <button onclick="document.getElementById('challenge-modal').style.display='none'" style="padding:10px 20px; cursor:pointer;">DECLINE</button>
    </div>

    <div id="loading-screen">Loading Game...</div>

    <div class="tabs">
        <button id="btn-search" class="tab-btn active" onclick="showTab('search-box', 'btn-search')">Search</button>
        <button id="btn-reqs" class="tab-btn" onclick="showTab('requests-container', 'btn-reqs'); Game.loadRequests()">Requests</button>
        <button id="btn-friends" class="tab-btn" onclick="showTab('friends-container', 'btn-friends'); Game.loadFriends()">Friends</button>
    </div>

    <div id="search-box" class="tab-content">
        <div class="search-container">
            <input id="search-u" placeholder="Player">
            <button class="search-btn" onclick="Game.search()">🔍</button>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="requests-container" class="tab-content"></div>
    <div id="friends-container" class="tab-content"></div>

    <nav class="bottom-nav">
        <button onclick="window.location.href='index.html'">🏠 Home</button>
        <button onclick="window.location.href='friends.html'">👥 Friends</button>
        <button onclick="window.location.href='dashboard.html'">♟ Play</button>
        <button onclick="window.location.href='profile.html'">👤 Me</button>
    </nav>

    <script>
        window.showTab = function(id, btnId) {
            document.querySelectorAll('.tab-content').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            document.getElementById(btnId).classList.add('active');
        };
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
